name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio

      - name: Run unit tests
        env:
          DATABASE_URL: postgresql+asyncpg://sentinel:sentinel@localhost:5432/sentinelpay
          REDIS_URL: redis://localhost:6379/0
          ANTHROPIC_API_KEY: sk-ant-placeholder-not-used-in-unit-tests
          SECRET_KEY: placeholder-secret-key-32-chars-ok
        run: |
          pytest tests/unit/ -v
